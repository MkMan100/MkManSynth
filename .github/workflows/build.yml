name: Build JUCE Plugin (Universal CMake)

on:
  push:
    branches: [ main, master ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSBuild Engine
      uses: microsoft/setup-msbuild@v2

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v2

    - name: Configure Project via CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build Plugin Components
      run: cmake --build build --config Release --parallel

    - name: Upload Compiled VST3 and Standalone
      uses: actions/upload-artifact@v4
      with:
        name: MkManSynth-Windows-Artifacts
        path: |
          build/MkManSynth_artefacts/Release/VST3/
          build/MkManSynth_artefacts/Release/Standalone/
